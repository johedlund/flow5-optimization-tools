name: Build Windows

on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        default: '6.6.2'
        type: string

env:
  QT_VERSION: ${{ inputs.qt_version || '6.6.2' }}
  OPENBLAS_VERSION: '0.3.26'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # Install Qt using the official action
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: false  # Disable cache to ensure clean download (re-enable after fix confirmed)
        # Note: Qt 6 base installation includes moc, uic, rcc, qmake by default

    - name: Debug Qt installation structure
      shell: pwsh
      run: |
        Write-Host "=== Dumping Qt installation structure ==="
        Write-Host "RUNNER_WORKSPACE: $env:RUNNER_WORKSPACE"
        Write-Host ""

        # Check expected Qt location
        $qtRoot = "$env:RUNNER_WORKSPACE\Qt"
        if (Test-Path $qtRoot) {
          Write-Host "Contents of $qtRoot (depth 5):"
          Get-ChildItem $qtRoot -Recurse -Depth 5 -ErrorAction SilentlyContinue |
            Where-Object { $_.PSIsContainer -or $_.Name -match '\.(exe|dll)$' } |
            ForEach-Object {
              $indent = "  " * ($_.FullName.Split('\').Count - $qtRoot.Split('\').Count)
              Write-Host "$indent$($_.Name)"
            }
        } else {
          Write-Host "WARNING: $qtRoot does not exist!"
          Write-Host ""
          Write-Host "Checking D:\a for Qt installations:"
          Get-ChildItem "D:\a" -Recurse -Depth 5 -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'qt|Qt' } |
            ForEach-Object { Write-Host "  $($_.FullName)" }
        }

        Write-Host ""
        Write-Host "=== Environment variables set by Qt action ==="
        Get-ChildItem env: | Where-Object { $_.Name -match 'qt|Qt' } |
          ForEach-Object { Write-Host "$($_.Name) = $($_.Value)" }

    - name: Set QT_ROOT_DIR
      shell: pwsh
      run: |
        # Debug: Show what variables are set by install-qt-action
        Write-Host "=== Variables from install-qt-action ==="
        Write-Host "Qt6_DIR: $env:Qt6_DIR"
        Write-Host "Qt5_DIR: $env:Qt5_DIR"
        Write-Host "IQTA_TOOLS: $env:IQTA_TOOLS"
        Write-Host "QT_ROOT_DIR (if set): $env:QT_ROOT_DIR"
        Write-Host ""

        # Helper function to verify Qt directory has essential tools
        function Test-QtDir($path) {
          if (-not $path) { return $false }
          $hasQmake = (Test-Path "$path\bin\qmake6.exe") -or (Test-Path "$path\bin\qmake.exe")
          $hasMoc = Test-Path "$path\bin\moc.exe"
          if ($hasQmake -and $hasMoc) {
            Write-Host "  Valid Qt at: $path (qmake=$hasQmake, moc=$hasMoc)"
            return $true
          }
          if ($hasQmake -or $hasMoc) {
            Write-Host "  Partial Qt at: $path (qmake=$hasQmake, moc=$hasMoc)"
          }
          return $false
        }

        $qt = $null

        # Method 1: Try Qt6_DIR directly
        if ($env:Qt6_DIR) {
          Write-Host "Checking Qt6_DIR..."
          $testPath = $env:Qt6_DIR
          if (Test-QtDir $testPath) {
            $qt = $testPath
          } elseif ($testPath -match '(.*)\\lib\\cmake\\Qt6') {
            # Extract root from cmake path
            $extracted = $matches[1]
            Write-Host "  Extracted from cmake path: $extracted"
            if (Test-QtDir $extracted) {
              $qt = $extracted
            }
          }
        }

        # Method 2: Try Qt5_DIR (some versions of the action use this)
        if (-not $qt -and $env:Qt5_DIR) {
          Write-Host "Checking Qt5_DIR..."
          if (Test-QtDir $env:Qt5_DIR) {
            $qt = $env:Qt5_DIR
          }
        }

        # Method 3: Search in RUNNER_WORKSPACE/Qt
        if (-not $qt) {
          Write-Host "Searching in RUNNER_WORKSPACE/Qt..."
          $qtRoot = "$env:RUNNER_WORKSPACE\Qt"
          if (Test-Path $qtRoot) {
            Write-Host "  Searching in: $qtRoot"
            Get-ChildItem $qtRoot -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "    Found: $($_.FullName)"
            }
            $candidates = Get-ChildItem $qtRoot -Directory -Recurse -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -match 'msvc.*64$' }
            foreach ($c in $candidates) {
              Write-Host "  Candidate: $($c.FullName)"
              if (Test-QtDir $c.FullName) {
                $qt = $c.FullName
                break
              }
            }
          }
        }

        # Method 4: Search common install locations
        if (-not $qt) {
          Write-Host "Searching common locations..."
          $locations = @(
            "C:\Qt\$env:QT_VERSION\msvc2019_64",
            "D:\a\Qt\$env:QT_VERSION\msvc2019_64",
            "$env:RUNNER_WORKSPACE\Qt\$env:QT_VERSION\msvc2019_64"
          )
          foreach ($loc in $locations) {
            if (Test-QtDir $loc) {
              $qt = $loc
              break
            }
          }
        }

        if (-not $qt) {
          Write-Error "Could not find valid Qt installation with both qmake and moc"
          Write-Host ""
          Write-Host "=== Directory listing for debugging ==="
          Write-Host "RUNNER_WORKSPACE: $env:RUNNER_WORKSPACE"
          if (Test-Path "$env:RUNNER_WORKSPACE\Qt") {
            Write-Host "Contents of $env:RUNNER_WORKSPACE\Qt:"
            Get-ChildItem "$env:RUNNER_WORKSPACE\Qt" -Recurse -Depth 4 -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host "Qt directory does not exist in RUNNER_WORKSPACE"
          }
          exit 1
        }

        Write-Host ""
        Write-Host "=== Selected QT_ROOT_DIR = $qt ==="

        # Verify bin contents
        Write-Host "Contents of $qt\bin:"
        Get-ChildItem "$qt\bin" -Filter "*.exe" -ErrorAction SilentlyContinue |
          Select-Object Name | ForEach-Object { Write-Host "  $($_.Name)" }

        "QT_ROOT_DIR=$qt" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Verify Qt
      shell: cmd
      run: |
        echo === Qt Environment ===
        echo Qt5_DIR=%Qt5_DIR%
        echo Qt6_DIR=%Qt6_DIR%
        echo QT_ROOT_DIR=%QT_ROOT_DIR%
        echo.
        echo === All exe files in QT_ROOT_DIR\bin ===
        dir "%QT_ROOT_DIR%\bin\*.exe" /b 2>nul || echo No exe files found
        echo.
        echo === Checking essential Qt binaries ===
        if exist "%QT_ROOT_DIR%\bin\qmake6.exe" (echo [OK] qmake6.exe found) else if exist "%QT_ROOT_DIR%\bin\qmake.exe" (echo [OK] qmake.exe found) else (echo [FAIL] qmake not found && exit /b 1)
        if exist "%QT_ROOT_DIR%\bin\moc.exe" (echo [OK] moc.exe found) else (echo [FAIL] moc.exe not found && exit /b 1)
        if exist "%QT_ROOT_DIR%\bin\uic.exe" (echo [OK] uic.exe found) else (echo [WARN] uic.exe not found)
        if exist "%QT_ROOT_DIR%\bin\rcc.exe" (echo [OK] rcc.exe found) else (echo [WARN] rcc.exe not found)
        echo.
        echo === Qt verification successful ===

    # Download dependencies
# Cache vcpkg packages - using save-always to cache even on failure
    - name: Cache vcpkg packages
      id: vcpkg-cache
      uses: actions/cache@v4
      with:
        path: |
          vcpkg/installed
          vcpkg/packages
          ~\AppData\Local\vcpkg\archives
        key: vcpkg-opencascade-x64-windows-v2-${{ hashFiles('**/vcpkg.json', '.github/workflows/build-windows.yml') }}
        restore-keys: |
          vcpkg-opencascade-x64-windows-v2-
          vcpkg-opencascade-x64-windows-
        save-always: true  # <-- THIS IS THE KEY FIX: saves cache even if later steps fail

    - name: Install vcpkg and OpenCASCADE
      shell: pwsh
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-binary-cache
      run: |
        # Create binary cache directory
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE"
        
        Write-Host "=== Installing vcpkg ==="
        if (-not (Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
        }
        .\vcpkg\bootstrap-vcpkg.bat

        # Skip install if cache hit and installed dir exists with OCCT
        if (Test-Path "vcpkg\installed\x64-windows\include\opencascade") {
            Write-Host "=== OCCT already installed from cache ==="
        } else {
            Write-Host "=== Installing OpenCASCADE via vcpkg (this takes ~3 hours first time) ==="
            .\vcpkg\vcpkg install opencascade:x64-windows
        }

        Write-Host "=== OCCT installed structure ==="
        Get-ChildItem ".\vcpkg\installed\x64-windows" -Recurse -Depth 2 -Directory | ForEach-Object { Write-Host $_.FullName }

    - name: Download OpenBLAS
      shell: pwsh
      run: |
        $url = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v${{ env.OPENBLAS_VERSION }}/OpenBLAS-${{ env.OPENBLAS_VERSION }}-x64.zip"
        Write-Host "Downloading OpenBLAS from: $url"
        Invoke-WebRequest -Uri $url -OutFile openblas.zip -UseBasicParsing
        Expand-Archive openblas.zip -DestinationPath "${{ github.workspace }}\openblas" -Force
        Remove-Item openblas.zip

        # Create 'openblas' subdirectory in include so #include <openblas/cblas.h> works
        $includeDir = Get-ChildItem "${{ github.workspace }}\openblas" -Recurse -Directory -Filter "include" | Select-Object -First 1
        if ($includeDir) {
            $openblasSubdir = "$($includeDir.FullName)\openblas"
            New-Item -ItemType Directory -Force -Path $openblasSubdir
            Copy-Item "$($includeDir.FullName)\*.h" $openblasSubdir -ErrorAction SilentlyContinue
            Write-Host "Created openblas include subdirectory: $openblasSubdir"
        }

        Write-Host "=== OpenBLAS structure ==="
        Get-ChildItem "${{ github.workspace }}\openblas" -Recurse -Depth 3 | ForEach-Object { Write-Host $_.FullName }

    - name: Configure paths
      shell: pwsh
      run: |
        $ws = "${{ github.workspace }}"

        # OCCT from vcpkg
        $occtDir = "$ws\vcpkg\installed\x64-windows"
        Write-Host "OCCT_DIR: $occtDir"

        # OpenBLAS - check if files are in root or subdirectory
        $openblasDir = "$ws\openblas"
        if (-not (Test-Path "$openblasDir\include")) {
            $sub = Get-ChildItem $openblasDir -Directory | Select-Object -First 1
            if ($sub -and (Test-Path "$($sub.FullName)\include")) {
                $openblasDir = $sub.FullName
            }
        }
        Write-Host "OpenBLAS: $openblasDir"

        # Set environment variables
        Add-Content $env:GITHUB_ENV "OCCT_DIR=$occtDir"
        Add-Content $env:GITHUB_ENV "OPENBLAS_INCLUDE=$openblasDir\include"
        Add-Content $env:GITHUB_ENV "OPENBLAS_LIB=$openblasDir\lib"

        # Add to PATH
        if (Test-Path "$occtDir\bin") {
            Add-Content $env:GITHUB_PATH "$occtDir\bin"
        }
        if (Test-Path "$openblasDir\bin") {
            Add-Content $env:GITHUB_PATH "$openblasDir\bin"
        }

    - name: Verify all dependencies
      shell: pwsh
      run: |
        Write-Host "=== Checking Qt ==="
        if (Test-Path "$env:QT_ROOT_DIR\bin\qmake6.exe") { Write-Host "qmake6: OK" } else { Write-Error "qmake6: MISSING"; exit 1 }
        if (Test-Path "$env:QT_ROOT_DIR\bin\moc.exe") { Write-Host "moc: OK" } else { Write-Error "moc: MISSING"; exit 1 }

        Write-Host "=== Checking OCCT ==="
        Write-Host "OCCT_DIR=$env:OCCT_DIR"
        if (Test-Path "$env:OCCT_DIR") { Write-Host "OCCT dir: OK" } else { Write-Error "OCCT: MISSING"; exit 1 }

        Write-Host "=== OCCT libraries available ==="
        Get-ChildItem "$env:OCCT_DIR\lib\TK*.lib" | ForEach-Object { Write-Host "  $($_.Name)" }

        Write-Host "=== OpenBLAS ==="
        Write-Host "OPENBLAS_INCLUDE=$env:OPENBLAS_INCLUDE"
        Write-Host "OPENBLAS_LIB=$env:OPENBLAS_LIB"
        Write-Host "=== OpenBLAS libraries available ==="
        Get-ChildItem "$env:OPENBLAS_LIB\*.lib" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
        Write-Host "=== OpenBLAS include/openblas ==="
        Get-ChildItem "$env:OPENBLAS_INCLUDE\openblas\*.h" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
        if (Test-Path "$env:OPENBLAS_INCLUDE") { Write-Host "OpenBLAS include: OK" } else { Write-Error "OpenBLAS: MISSING"; exit 1 }

        Write-Host "=== All dependencies verified ==="

    - name: Determine qmake executable and set PATH
      shell: cmd
      run: |
        if exist "%QT_ROOT_DIR%\bin\qmake6.exe" (echo QMAKE_EXE=%QT_ROOT_DIR%\bin\qmake6.exe>> %GITHUB_ENV%) else if exist "%QT_ROOT_DIR%\bin\qmake.exe" (echo QMAKE_EXE=%QT_ROOT_DIR%\bin\qmake.exe>> %GITHUB_ENV%) else (echo ERROR: No qmake executable found && exit /b 1)
        echo %QT_ROOT_DIR%\bin>> %GITHUB_PATH%

    - name: Pre-build diagnostics
      shell: cmd
      run: |
        echo === Environment Check ===
        echo QMAKE_EXE=%QMAKE_EXE%
        echo QT_ROOT_DIR=%QT_ROOT_DIR%
        echo OCCT_DIR=%OCCT_DIR%
        echo OPENBLAS_INCLUDE=%OPENBLAS_INCLUDE%
        echo OPENBLAS_LIB=%OPENBLAS_LIB%
        echo.
        echo === PATH ===
        echo %PATH%
        echo.
        echo === Verifying moc can run ===
        moc -v
        echo.

    - name: Build XFoil-lib
      shell: cmd
      run: |
        cd XFoil-lib
        "%QMAKE_EXE%" XFoil-lib.pro CONFIG+=release
        nmake
        if exist XFoil1.dll (echo SUCCESS: XFoil1.dll) else (exit /b 1)

    - name: Build fl5-lib
      shell: pwsh
      run: |
        cd fl5-lib
        # Save original INCLUDE, then clear paths with spaces for qmake
        $origInclude = $env:INCLUDE
        # Keep only paths without spaces (filter out Windows SDK paths)
        $env:INCLUDE = ($origInclude -split ';' | Where-Object { $_ -notmatch ' ' }) -join ';'
        Write-Host "Filtered INCLUDE for qmake: $env:INCLUDE"
        & "$env:QMAKE_EXE" fl5-lib.pro CONFIG+=release CONFIG+=CI_OPENBLAS CONFIG+=CI_VCPKG
        # Restore full INCLUDE for compilation
        $env:INCLUDE = $origInclude
        nmake
        if (Test-Path "fl5-lib.dll" -or Test-Path "fl5-lib1.dll") { Write-Host "SUCCESS: fl5-lib*.dll" } else { exit 1 }

    - name: Build fl5-app
      shell: pwsh
      run: |
        cd fl5-app
        # Save original INCLUDE, then clear paths with spaces for qmake
        $origInclude = $env:INCLUDE
        $env:INCLUDE = ($origInclude -split ';' | Where-Object { $_ -notmatch ' ' }) -join ';'
        Write-Host "Filtered INCLUDE for qmake: $env:INCLUDE"
        & "$env:QMAKE_EXE" fl5-app.pro CONFIG+=release CONFIG+=CI_OPENBLAS CONFIG+=CI_VCPKG CONFIG+=NO_GMSH
        # Restore full INCLUDE for compilation
        $env:INCLUDE = $origInclude
        nmake
        if (Test-Path "flow5.exe") { Write-Host "SUCCESS: flow5.exe" } else { exit 1 }

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path deploy
        Copy-Item fl5-app/flow5.exe deploy/

        # Qt deployment
        & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations deploy/flow5.exe

        # Copy OCCT DLLs (from vcpkg)
        if (Test-Path "$env:OCCT_DIR\bin") {
            Copy-Item "$env:OCCT_DIR\bin\*.dll" deploy/ -ErrorAction SilentlyContinue
        }

        # Copy OpenBLAS
        Get-ChildItem "${{ github.workspace }}\openblas" -Recurse -Filter "*.dll" | Copy-Item -Destination deploy/ -ErrorAction SilentlyContinue

        # Copy our libraries
        Copy-Item "XFoil-lib/XFoil1.dll" deploy/ -ErrorAction SilentlyContinue
        Copy-Item "fl5-lib/fl5-lib1.dll" deploy/ -ErrorAction SilentlyContinue

        Write-Host "=== Deployed files ==="
        Get-ChildItem deploy/ | Format-Table Name, Length

    - name: Create ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path deploy/* -DestinationPath "flow5-7.54-windows-x64.zip"
        Get-Item "flow5-*.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flow5-windows-x64
        path: flow5-*.zip
        retention-days: 30
