name: Build Windows

on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        default: '6.6.2'
        type: string

env:
  QT_VERSION: ${{ inputs.qt_version || '6.6.2' }}
  OCCT_VERSION: '7_9_2'
  GMSH_VERSION: '4.13.1'
  OPENBLAS_VERSION: '0.3.26'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # Install Qt using the official action
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: true
        # Note: Qt 6 base installation includes moc, uic, rcc, qmake by default

    - name: Set QT_ROOT_DIR
      shell: pwsh
      run: |
        # Debug: Show what variables are set
        Write-Host "Qt6_DIR from action: $env:Qt6_DIR"
        Write-Host "Qt5_DIR from action: $env:Qt5_DIR"
        Write-Host "IQTA_TOOLS from action: $env:IQTA_TOOLS"

        # The install-qt-action sets Qt6_DIR to the root Qt installation
        # It should be something like: D:\a\<repo>\Qt\6.6.2\msvc2019_64
        $qt = $null

        if ($env:Qt6_DIR) {
          # Qt6_DIR might point to cmake dir, extract root if needed
          $testPath = $env:Qt6_DIR
          if (Test-Path "$testPath\bin\qmake6.exe") {
            $qt = $testPath
          } elseif ($testPath -match '(.*)\\lib\\cmake\\Qt6') {
            # Extract root from cmake path
            $qt = $matches[1]
          }
        }

        if (-not $qt -and $env:Qt5_DIR) {
          $testPath = $env:Qt5_DIR
          if (Test-Path "$testPath\bin\qmake6.exe") {
            $qt = $testPath
          }
        }

        if (-not $qt) {
          # Fallback: search in runner.workspace/Qt
          Write-Host "Searching for Qt in workspace..."
          $qtRoot = "$env:RUNNER_WORKSPACE\Qt"
          if (Test-Path $qtRoot) {
            $qt = (Get-ChildItem $qtRoot -Directory -Recurse -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -match 'msvc.*64$' -and (Test-Path "$($_.FullName)\bin\qmake6.exe") } |
                   Select-Object -First 1).FullName
          }
        }

        if (-not $qt) {
          Write-Error "Could not determine Qt installation directory"
          Write-Host "Available directories in runner workspace:"
          Get-ChildItem $env:RUNNER_WORKSPACE -Recurse -Depth 3 -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'qt|msvc' } |
            ForEach-Object { Write-Host "  $($_.FullName)" }
          exit 1
        }

        Write-Host "Detected QT_ROOT_DIR = $qt"
        "QT_ROOT_DIR=$qt" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Verify Qt
      shell: cmd
      run: |
        echo === Qt Environment ===
        echo Qt5_DIR=%Qt5_DIR%
        echo Qt6_DIR=%Qt6_DIR%
        echo QT_ROOT_DIR=%QT_ROOT_DIR%
        echo.
        echo === Contents of QT_ROOT_DIR\bin ===
        dir "%QT_ROOT_DIR%\bin\*.exe" 2>nul | findstr /i "exe" || echo No exe files found
        echo.
        echo === Checking Qt binaries ===
        if exist "%QT_ROOT_DIR%\bin\qmake6.exe" (echo [OK] qmake6.exe found) else if exist "%QT_ROOT_DIR%\bin\qmake.exe" (echo [OK] qmake.exe found) else (echo [FAIL] qmake not found && exit /b 1)
        if exist "%QT_ROOT_DIR%\bin\moc.exe" (echo [OK] moc.exe found) else (echo [FAIL] moc.exe not found && exit /b 1)
        echo.
        echo === Qt verification successful ===

    # Download dependencies
    - name: Download OpenCASCADE
      shell: pwsh
      run: |
        $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V${{ env.OCCT_VERSION }}/occt-combined-release-no-pch.zip"
        Write-Host "Downloading OCCT from: $occtUrl"
        Invoke-WebRequest -Uri $occtUrl -OutFile occt.zip -UseBasicParsing
        Expand-Archive occt.zip -DestinationPath "${{ github.workspace }}\occt" -Force
        Remove-Item occt.zip

        # Find and display structure
        Write-Host "=== OCCT structure ==="
        Get-ChildItem "${{ github.workspace }}\occt" -Recurse -Depth 2 -Directory | ForEach-Object { Write-Host $_.FullName }

    - name: Download GMSH
      shell: pwsh
      run: |
        $gmshUrl = "https://gmsh.info/bin/Windows/gmsh-${{ env.GMSH_VERSION }}-Windows64-sdk.zip"
        Write-Host "Downloading GMSH from: $gmshUrl"
        Invoke-WebRequest -Uri $gmshUrl -OutFile gmsh.zip -UseBasicParsing
        Expand-Archive gmsh.zip -DestinationPath "${{ github.workspace }}\gmsh" -Force
        Remove-Item gmsh.zip

        Write-Host "=== GMSH structure ==="
        Get-ChildItem "${{ github.workspace }}\gmsh" -Recurse -Depth 2 -Directory | ForEach-Object { Write-Host $_.FullName }

    - name: Download OpenBLAS
      shell: pwsh
      run: |
        $url = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v${{ env.OPENBLAS_VERSION }}/OpenBLAS-${{ env.OPENBLAS_VERSION }}-x64.zip"
        Write-Host "Downloading OpenBLAS from: $url"
        Invoke-WebRequest -Uri $url -OutFile openblas.zip -UseBasicParsing
        Expand-Archive openblas.zip -DestinationPath "${{ github.workspace }}\openblas" -Force
        Remove-Item openblas.zip

        Write-Host "=== OpenBLAS structure ==="
        Get-ChildItem "${{ github.workspace }}\openblas" -Recurse -Depth 2 | ForEach-Object { Write-Host $_.FullName }

    - name: Configure paths
      shell: pwsh
      run: |
        $ws = "${{ github.workspace }}"

        # Find OCCT - look for inc directory
        $occtInc = Get-ChildItem "$ws\occt" -Recurse -Directory -Filter "inc" | Select-Object -First 1
        if ($occtInc) {
            $occtDir = $occtInc.Parent.FullName
        } else {
            $occtDir = (Get-ChildItem "$ws\occt" -Directory | Select-Object -First 1).FullName
            if (-not $occtDir) { $occtDir = "$ws\occt" }
        }
        Write-Host "OCCT_DIR: $occtDir"

        # Find GMSH
        $gmshDir = (Get-ChildItem "$ws\gmsh" -Directory -Filter "gmsh*" | Select-Object -First 1).FullName
        if (-not $gmshDir) { $gmshDir = "$ws\gmsh" }
        Write-Host "GMSH_DIR: $gmshDir"

        # OpenBLAS - check if files are in root or subdirectory
        $openblasDir = "$ws\openblas"
        if (-not (Test-Path "$openblasDir\include")) {
            $sub = Get-ChildItem $openblasDir -Directory | Select-Object -First 1
            if ($sub -and (Test-Path "$($sub.FullName)\include")) {
                $openblasDir = $sub.FullName
            }
        }
        Write-Host "OpenBLAS: $openblasDir"

        # Set environment variables
        Add-Content $env:GITHUB_ENV "OCCT_DIR=$occtDir"
        Add-Content $env:GITHUB_ENV "GMSH_DIR=$gmshDir"
        Add-Content $env:GITHUB_ENV "OPENBLAS_INCLUDE=$openblasDir\include"
        Add-Content $env:GITHUB_ENV "OPENBLAS_LIB=$openblasDir\lib"

        # Add to PATH
        if (Test-Path "$occtDir\win64\vc14\bin") {
            Add-Content $env:GITHUB_PATH "$occtDir\win64\vc14\bin"
        }
        if (Test-Path "$gmshDir\lib") {
            Add-Content $env:GITHUB_PATH "$gmshDir\lib"
        }
        if (Test-Path "$openblasDir\bin") {
            Add-Content $env:GITHUB_PATH "$openblasDir\bin"
        }

    - name: Verify all dependencies
      shell: cmd
      run: |
        echo === Checking Qt ===
        if exist "%QT_ROOT_DIR%\bin\qmake6.exe" (echo qmake6: OK) else (echo qmake6: MISSING && exit /b 1)
        if exist "%QT_ROOT_DIR%\bin\moc.exe" (echo moc: OK) else (echo moc: MISSING && exit /b 1)

        echo === Checking OCCT ===
        echo OCCT_DIR=%OCCT_DIR%
        if exist "%OCCT_DIR%" (echo OCCT dir: OK) else (echo OCCT: MISSING && exit /b 1)

        echo === Checking OpenBLAS ===
        echo OPENBLAS_INCLUDE=%OPENBLAS_INCLUDE%
        if exist "%OPENBLAS_INCLUDE%" (echo OpenBLAS include: OK) else (echo OpenBLAS: MISSING && exit /b 1)

        echo === All dependencies verified ===

    - name: Determine qmake executable
      shell: cmd
      run: |
        if exist "%QT_ROOT_DIR%\bin\qmake6.exe" (echo QMAKE_EXE=%QT_ROOT_DIR%\bin\qmake6.exe>> %GITHUB_ENV%) else if exist "%QT_ROOT_DIR%\bin\qmake.exe" (echo QMAKE_EXE=%QT_ROOT_DIR%\bin\qmake.exe>> %GITHUB_ENV%) else (echo ERROR: No qmake executable found && exit /b 1)

    - name: Build XFoil-lib
      shell: cmd
      run: |
        cd XFoil-lib
        "%QMAKE_EXE%" XFoil-lib.pro CONFIG+=release
        nmake
        if exist XFoil1.dll (echo SUCCESS: XFoil1.dll) else (exit /b 1)

    - name: Build fl5-lib
      shell: cmd
      run: |
        cd fl5-lib
        "%QMAKE_EXE%" fl5-lib.pro CONFIG+=release CONFIG+=CI_OPENBLAS
        nmake
        if exist fl5-lib1.dll (echo SUCCESS: fl5-lib1.dll) else (exit /b 1)

    - name: Build fl5-app
      shell: cmd
      run: |
        cd fl5-app
        "%QMAKE_EXE%" fl5-app.pro CONFIG+=release CONFIG+=CI_OPENBLAS
        nmake
        if exist flow5.exe (echo SUCCESS: flow5.exe) else (exit /b 1)

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path deploy
        Copy-Item fl5-app/flow5.exe deploy/

        # Qt deployment
        & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations deploy/flow5.exe

        # Copy OCCT DLLs
        if (Test-Path "$env:OCCT_DIR\win64\vc14\bin") {
            Copy-Item "$env:OCCT_DIR\win64\vc14\bin\*.dll" deploy/ -ErrorAction SilentlyContinue
        }

        # Copy GMSH
        if (Test-Path "$env:GMSH_DIR\lib\gmsh.dll") {
            Copy-Item "$env:GMSH_DIR\lib\gmsh.dll" deploy/
        }

        # Copy OpenBLAS
        Get-ChildItem "${{ github.workspace }}\openblas" -Recurse -Filter "*.dll" | Copy-Item -Destination deploy/ -ErrorAction SilentlyContinue

        # Copy our libraries
        Copy-Item "XFoil-lib/XFoil1.dll" deploy/ -ErrorAction SilentlyContinue
        Copy-Item "fl5-lib/fl5-lib1.dll" deploy/ -ErrorAction SilentlyContinue

        Write-Host "=== Deployed files ==="
        Get-ChildItem deploy/ | Format-Table Name, Length

    - name: Create ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path deploy/* -DestinationPath "flow5-7.54-windows-x64.zip"
        Get-Item "flow5-*.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flow5-windows-x64
        path: flow5-*.zip
        retention-days: 30
