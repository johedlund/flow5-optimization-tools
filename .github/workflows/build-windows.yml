name: Build Windows

on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt version'
        default: '6.6.2'
        type: string
      occt_version:
        description: 'OpenCASCADE version (use underscores, e.g., 7_9_2)'
        default: '7_9_2'
        type: string
      gmsh_version:
        description: 'GMSH version'
        default: '4.13.1'
        type: string

env:
  QT_VERSION: ${{ inputs.qt_version || '6.6.2' }}
  OCCT_VERSION: ${{ inputs.occt_version || '7_9_2' }}
  GMSH_VERSION: ${{ inputs.gmsh_version || '4.13.1' }}
  OPENBLAS_VERSION: '0.3.26'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # Install Qt using the action (has built-in caching)
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        cache: true

    # Cache other dependencies
    - name: Cache OpenCASCADE
      id: cache-occt
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/deps/occt
        key: occt-${{ env.OCCT_VERSION }}-windows-combined-v3

    - name: Cache GMSH
      id: cache-gmsh
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/deps/gmsh
        key: gmsh-${{ env.GMSH_VERSION }}-windows-v2

    - name: Cache OpenBLAS
      id: cache-openblas
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/deps/openblas
        key: openblas-${{ env.OPENBLAS_VERSION }}-windows-v2

    # Download OpenCASCADE
    - name: Download OpenCASCADE
      if: steps.cache-occt.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/deps/occt"
        # Use the combined package which includes all dependencies
        $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V${{ env.OCCT_VERSION }}/occt-combined-release-no-pch.zip"
        Write-Host "Downloading OCCT from: $occtUrl"
        Invoke-WebRequest -Uri $occtUrl -OutFile occt.zip -UseBasicParsing
        Expand-Archive occt.zip -DestinationPath "${{ github.workspace }}/deps/occt" -Force
        Remove-Item occt.zip
        Write-Host "=== OCCT extracted contents (showing structure) ==="
        Get-ChildItem -Path "${{ github.workspace }}/deps/occt" -Recurse -Depth 3 | ForEach-Object { Write-Host $_.FullName }

    # Download GMSH SDK
    - name: Download GMSH SDK
      if: steps.cache-gmsh.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/deps/gmsh"
        $gmshUrl = "https://gmsh.info/bin/Windows/gmsh-${{ env.GMSH_VERSION }}-Windows64-sdk.zip"
        Write-Host "Downloading GMSH from: $gmshUrl"
        Invoke-WebRequest -Uri $gmshUrl -OutFile gmsh.zip -UseBasicParsing
        Expand-Archive gmsh.zip -DestinationPath "${{ github.workspace }}/deps/gmsh" -Force
        Remove-Item gmsh.zip
        Write-Host "=== GMSH extracted contents ==="
        Get-ChildItem -Path "${{ github.workspace }}/deps/gmsh" -Recurse -Depth 2 | ForEach-Object { Write-Host $_.FullName }

    # Download OpenBLAS
    - name: Download OpenBLAS
      if: steps.cache-openblas.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/deps/openblas"
        $openblasUrl = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v${{ env.OPENBLAS_VERSION }}/OpenBLAS-${{ env.OPENBLAS_VERSION }}-x64.zip"
        Write-Host "Downloading OpenBLAS from: $openblasUrl"
        Invoke-WebRequest -Uri $openblasUrl -OutFile openblas.zip -UseBasicParsing
        Expand-Archive openblas.zip -DestinationPath "${{ github.workspace }}/deps/openblas" -Force
        Remove-Item openblas.zip
        Write-Host "=== OpenBLAS extracted contents ==="
        Get-ChildItem -Path "${{ github.workspace }}/deps/openblas" -Recurse -Depth 2 | ForEach-Object { Write-Host $_.FullName }

    # Configure environment - find actual paths dynamically
    - name: Configure environment
      shell: pwsh
      run: |
        $depsDir = "${{ github.workspace }}\deps"

        # Qt - use the path set by install-qt-action
        Write-Host "=== Qt Configuration ==="
        Write-Host "QT_ROOT_DIR from action: $env:QT_ROOT_DIR"
        $qtPath = $env:QT_ROOT_DIR
        if (-not $qtPath -or -not (Test-Path "$qtPath\bin\qmake6.exe")) {
            Write-Error "Qt not found! QT_ROOT_DIR=$qtPath"
            exit 1
        }
        Write-Host "Qt path verified: $qtPath"

        # OCCT - find the inc directory
        Write-Host "`n=== OCCT Configuration ==="
        $occtBase = "$depsDir\occt"
        $incDir = Get-ChildItem -Path $occtBase -Recurse -Directory -Filter "inc" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($incDir) {
            $occtPath = $incDir.Parent.FullName
        } else {
            # Maybe headers are directly in a subfolder
            $firstDir = Get-ChildItem -Path $occtBase -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($firstDir) {
                $occtPath = $firstDir.FullName
            } else {
                $occtPath = $occtBase
            }
        }
        Write-Host "OCCT path: $occtPath"
        Write-Host "OCCT inc exists: $(Test-Path "$occtPath\inc")"

        # GMSH - find gmsh-* directory
        Write-Host "`n=== GMSH Configuration ==="
        $gmshDir = Get-ChildItem -Path "$depsDir\gmsh" -Directory -Filter "gmsh*" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($gmshDir) {
            $gmshPath = $gmshDir.FullName
        } else {
            $gmshPath = "$depsDir\gmsh"
        }
        Write-Host "GMSH path: $gmshPath"
        Write-Host "GMSH lib exists: $(Test-Path "$gmshPath\lib")"

        # OpenBLAS - check structure
        Write-Host "`n=== OpenBLAS Configuration ==="
        $openblasPath = "$depsDir\openblas"
        # OpenBLAS zip might extract with or without subdirectory
        if (-not (Test-Path "$openblasPath\include")) {
            $subdir = Get-ChildItem -Path $openblasPath -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($subdir -and (Test-Path "$($subdir.FullName)\include")) {
                $openblasPath = $subdir.FullName
            }
        }
        Write-Host "OpenBLAS path: $openblasPath"
        Write-Host "OpenBLAS include exists: $(Test-Path "$openblasPath\include")"
        Write-Host "OpenBLAS lib exists: $(Test-Path "$openblasPath\lib")"

        # Set environment variables
        Write-Host "`n=== Setting Environment Variables ==="
        Add-Content $env:GITHUB_ENV "Qt6_DIR=$qtPath"
        Add-Content $env:GITHUB_ENV "OCCT_DIR=$occtPath"
        Add-Content $env:GITHUB_ENV "GMSH_DIR=$gmshPath"
        Add-Content $env:GITHUB_ENV "OPENBLAS_INCLUDE=$openblasPath\include"
        Add-Content $env:GITHUB_ENV "OPENBLAS_LIB=$openblasPath\lib"

        # Add to PATH
        Add-Content $env:GITHUB_PATH "$qtPath\bin"
        if (Test-Path "$occtPath\win64\vc14\bin") {
            Add-Content $env:GITHUB_PATH "$occtPath\win64\vc14\bin"
        }
        if (Test-Path "$gmshPath\lib") {
            Add-Content $env:GITHUB_PATH "$gmshPath\lib"
        }
        if (Test-Path "$openblasPath\bin") {
            Add-Content $env:GITHUB_PATH "$openblasPath\bin"
        }

        Write-Host "`nEnvironment configured successfully"

    # Verify all dependencies before build
    - name: Verify dependencies
      shell: cmd
      run: |
        echo === Verifying Qt ===
        where qmake6.exe
        qmake6.exe -v
        echo.
        echo === Environment Variables ===
        echo Qt6_DIR=%Qt6_DIR%
        echo OCCT_DIR=%OCCT_DIR%
        echo GMSH_DIR=%GMSH_DIR%
        echo OPENBLAS_INCLUDE=%OPENBLAS_INCLUDE%
        echo OPENBLAS_LIB=%OPENBLAS_LIB%
        echo.
        echo === Checking paths ===
        if exist "%Qt6_DIR%\bin\qmake6.exe" (echo Qt: OK) else (echo Qt: MISSING && exit /b 1)
        if exist "%OCCT_DIR%" (echo OCCT dir: OK) else (echo OCCT: MISSING && exit /b 1)
        if exist "%OPENBLAS_INCLUDE%" (echo OpenBLAS include: OK) else (echo OpenBLAS include: MISSING && exit /b 1)

    # Build XFoil-lib
    - name: Build XFoil-lib
      shell: cmd
      run: |
        cd XFoil-lib
        qmake6.exe XFoil-lib.pro CONFIG+=release
        nmake
        if exist XFoil1.dll (echo Build successful: XFoil1.dll) else (echo Build failed && exit /b 1)

    # Build fl5-lib
    - name: Build fl5-lib
      shell: cmd
      run: |
        cd fl5-lib
        qmake6.exe fl5-lib.pro CONFIG+=release CONFIG+=CI_OPENBLAS
        nmake
        if exist fl5-lib1.dll (echo Build successful: fl5-lib1.dll) else (echo Build failed && exit /b 1)

    # Build fl5-app
    - name: Build fl5-app
      shell: cmd
      run: |
        cd fl5-app
        qmake6.exe fl5-app.pro CONFIG+=release CONFIG+=CI_OPENBLAS
        nmake
        if exist flow5.exe (echo Build successful: flow5.exe) else (echo Build failed && exit /b 1)

    # Package application
    - name: Package application
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path deploy

        # Copy main executable
        Copy-Item fl5-app/flow5.exe deploy/

        # Run windeployqt
        & windeployqt.exe --release --no-translations --no-system-d3d-compiler deploy/flow5.exe

        # Copy OpenCASCADE DLLs
        $occtBin = "$env:OCCT_DIR\win64\vc14\bin"
        if (Test-Path $occtBin) {
            Get-ChildItem "$occtBin\*.dll" | Copy-Item -Destination deploy/ -ErrorAction SilentlyContinue
            Write-Host "Copied OCCT DLLs"
        }

        # Copy GMSH DLL
        if (Test-Path "$env:GMSH_DIR\lib\gmsh.dll") {
            Copy-Item "$env:GMSH_DIR\lib\gmsh.dll" deploy/
            Write-Host "Copied gmsh.dll"
        }

        # Copy OpenBLAS DLLs
        $openblasDir = "${{ github.workspace }}\deps\openblas"
        if (Test-Path "$openblasDir\bin\*.dll") {
            Get-ChildItem "$openblasDir\bin\*.dll" | Copy-Item -Destination deploy/ -ErrorAction SilentlyContinue
            Write-Host "Copied OpenBLAS DLLs"
        }

        # Copy our libraries
        Copy-Item "XFoil-lib/XFoil1.dll" deploy/ -ErrorAction SilentlyContinue
        Copy-Item "fl5-lib/fl5-lib1.dll" deploy/ -ErrorAction SilentlyContinue

        Write-Host "=== Deployed files ==="
        Get-ChildItem deploy/ | Format-Table Name, Length

    # Create ZIP
    - name: Create ZIP
      shell: pwsh
      run: |
        $version = "7.54"
        $zipName = "flow5-$version-windows-x64.zip"
        Compress-Archive -Path deploy/* -DestinationPath $zipName
        Write-Host "Created: $zipName"
        Get-Item $zipName | Format-Table Name, Length

    # Upload artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flow5-windows-x64
        path: flow5-*.zip
        retention-days: 30
